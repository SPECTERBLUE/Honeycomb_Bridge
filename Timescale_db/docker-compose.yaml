services:
  timescaledb:
    image: timescale/timescaledb:2.14.2-pg15
    container_name: timescaledb
    restart: always
    environment:
      POSTGRES_DB: timeseries_db
      POSTGRES_USER: ts_user
      POSTGRES_PASSWORD: ts_password
    ports:
      - "5436:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ts_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - magistrala-base-net

networks:
  magistrala-base-net:
    driver: bridge

volumes:
  timescale_data:
